<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OperAI Mobile Planner</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #0f172a;
      --panel: #111827;
      --card: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #020617 0%, var(--bg) 50%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 14px;
    }

    .app-shell {
      width: 100%;
      max-width: 460px;
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 18px;
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 40px rgba(2, 6, 23, 0.5);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.3rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.4;
    }

    label {
      display: block;
      margin: 14px 0 8px;
      font-weight: 600;
      font-size: 0.86rem;
      color: #cbd5e1;
    }

    textarea {
      width: 100%;
      min-height: 128px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #0b1220;
      color: var(--text);
      padding: 12px;
      resize: vertical;
      font-size: 0.96rem;
      line-height: 1.4;
    }

    button {
      margin-top: 12px;
      width: 100%;
      border: none;
      background: var(--accent);
      color: #052e16;
      border-radius: 12px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .status {
      margin-top: 12px;
      min-height: 24px;
      font-size: 0.9rem;
      color: #cbd5e1;
    }

    .status.error { color: var(--danger); }

    .result {
      margin-top: 12px;
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      white-space: pre-wrap;
      overflow: auto;
      max-height: 52vh;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.83rem;
      color: #bfdbfe;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <h1>OperAI Mobile App Planner</h1>
    <p>Describe your mobile app idea and get a structured execution blueprint.</p>

    <label for="idea">Your app idea</label>
    <textarea id="idea" placeholder="Example: A habit tracker for college students with streaks and accountability groups."></textarea>

    <button id="generateBtn" onclick="runPlanner()">Generate plan</button>
    <div class="status" id="status"></div>
    <pre class="result" id="output">Waiting for your app idea…</pre>
  </main>

  <script>
    async function runPlanner() {
      const button = document.getElementById('generateBtn');
      const status = document.getElementById('status');
      const output = document.getElementById('output');
      const idea = document.getElementById('idea').value.trim();

      status.className = 'status';

      if (!idea) {
        status.textContent = 'Please enter your app idea first.';
        return;
      }

      button.disabled = true;
      status.textContent = 'Generating your mobile app execution plan…';
      output.textContent = 'Working…';

      try {
        const res = await fetch('/operai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idea: `Mobile app: ${idea}` })
        });

        const data = await res.json();

        if (data.mode === 'insufficient_clarity') {
          status.textContent = `Need more clarity (score: ${Number(data.clarity_score || 0).toFixed(2)}).`;
          output.textContent = data.next_question || 'Please add more details about your users and value.';
          return;
        }

        if (data.mode === 'execution_ready') {
          status.textContent = 'Plan ready.';
          output.textContent = JSON.stringify(data.machine_schema, null, 2);
          return;
        }

        status.className = 'status error';
        status.textContent = 'Unexpected response from server.';
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        status.className = 'status error';
        status.textContent = 'Could not reach backend service.';
        output.textContent = String(error);
      } finally {
        button.disabled = false;
      }
    }
  </script>
</body>
</html>
