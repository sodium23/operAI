<!DOCTYPE html>
<html>
<head>
<title>OperAIExecutionOS</title>
<style>
body { font-family: Arial; padding: 40px; background: #f4f6f8; }
textarea { width: 100%; height: 120px; }
button { padding: 10px 16px; margin-top: 10px; }
pre { background: white; padding: 20px; }
</style>
</head>
<body>

<h1>OperAIExecutionOS</h1>

<textarea id="idea" placeholder="Describe your idea"></textarea>
<br>
<button onclick="run()">Generate</button>

<pre id="output"></pre>

<script>

let questionCount = 0;

async function run() {

    const idea = document.getElementById("idea").value;

    const res = await fetch("/operai", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            input_text: idea,
            question_count: questionCount
        })
    });

    const data = await res.json();

    if (data.mode === "clarification") {
        questionCount = data.question_count;
        document.getElementById("output").innerText = data.question;
        return;
    }

    if (data.mode === "execution") {
        document.getElementById("output").innerText =
            JSON.stringify(data.human_readable, null, 2);
    }
}

</script>

</body>
</html>
