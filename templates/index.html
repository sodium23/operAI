<!DOCTYPE html>
<html>
<head>

<title>OperAI</title>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
}

button{
margin-top:10px;
padding:10px 18px;
font-size:16px;
background:#2563eb;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

.section{
background:white;
margin-top:20px;
padding:20px;
border-radius:8px;
}

h2{
margin-top:0;
}

pre{
white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="container">

<h1>OperAI – AI Execution OS</h1>

<div class="section">

<h2>Describe Your Idea</h2>

<textarea id="idea" placeholder="Example: AI tool that converts product ideas into execution-ready plans"></textarea>

<br>

<button onclick="runFlow()">Generate Execution Pack</button>

</div>


<div class="section">

<h2>Execution Pack</h2>

<div id="output">Waiting for input...</div>

</div>

</div>

<script>

async function runFlow(){

const idea=document.getElementById("idea").value

document.getElementById("output").innerText="Generating..."

const response=await fetch("/ux-flow",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
input_text:idea,
input_type:"text"
})
})

const data=await response.json()

renderOutput(data)

}

function renderOutput(data){

let html=""

html+="<h3>Product Overview</h3>"+data.prd.product_overview

html+="<h3>User Stories</h3>"

data.user_stories.forEach(s=>{
html+="<p>"+s.story+"</p>"
html+="<ul>"
s.acceptance_criteria.forEach(c=>{
html+="<li>"+c+"</li>"
})
html+="</ul>"
})

html+="<h3>Architecture</h3>"
html+="<pre>"+JSON.stringify(data.architecture,null,2)+"</pre>"

html+="<h3>Edge Cases</h3>"
html+="<pre>"+JSON.stringify(data.edge_cases,null,2)+"</pre>"

html+="<h3>Tests</h3>"
html+="<pre>"+JSON.stringify(data.tests,null,2)+"</pre>"

document.getElementById("output").innerHTML=html
}

</script>

</body>
</html>
